[workspace]
members = ["babybear"]

resolver = "2"

[profile.release]
opt-level = 3

[profile.bench]
opt-level = 3

[profile.fast]
inherits = "release"
debug = true
debug-assertions = true


[workspace.dependencies]
p3-field = { path = "../Plonky3/field" }
p3-baby-bear = { path = "../Plonky3/baby-bear" }
p3-poseidon2 = { path = "../Plonky3/poseidon2" }
p3-symmetric = { path = "../Plonky3/symmetric" }