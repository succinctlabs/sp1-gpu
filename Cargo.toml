[workspace]
members = ["air", "core", "prover"]

exclude = ["sppark/poc/ntt-cuda", "sppark/rust"]

resolver = "2"

[profile.release]
opt-level = 3

[profile.bench]
opt-level = 3

[profile.fast]
inherits = "release"
debug = true
debug-assertions = true

[workspace.dependencies]
sp1-core = { git = "https://github.com/succinctlabs/sp1.git", branch = "critical-06-26" }
sp1-prover = { git = "https://github.com/succinctlabs/sp1.git", branch = "critical-06-26" }


p3-air = { git = "https://github.com/Plonky3/Plonky3.git", rev = "b447924a508a780b997d451f9864e593efce0843" }
